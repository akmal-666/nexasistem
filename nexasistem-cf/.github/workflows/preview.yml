name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    name: Build & Preview
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Build all apps
        env:
          NEXT_PUBLIC_API_URL: https://api.nexasistem.com
          NEXT_PUBLIC_APP_URL: https://app.nexasistem.com
        run: |
          cd frontend/apps/app && npx @cloudflare/next-on-pages
          cd ../../apps/admin && npx @cloudflare/next-on-pages

      - name: Deploy preview (app)
        id: preview-app
        working-directory: frontend/apps/app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          URL=$(npx wrangler pages deploy .vercel/output/static \
            --project-name nexasistem-app \
            --branch "pr-${{ github.event.pull_request.number }}" \
            2>&1 | grep -o 'https://[^ ]*' | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deploy\n\n| App | URL |\n|-----|-----|\n| Tenant App | ${{ steps.preview-app.outputs.url }} |\n\nCommit: \`${{ github.sha }}\``
            })
