name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      web:      ${{ steps.filter.outputs.web }}
      app:      ${{ steps.filter.outputs.app }}
      admin:    ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/**'
            web:
              - 'frontend/apps/web/**'
              - 'packages/**'
            app:
              - 'frontend/apps/app/**'
              - 'packages/**'
            admin:
              - 'frontend/apps/admin/**'
              - 'packages/**'

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    name: Deploy API Workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: Deploy Workers
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@^3.60.0 deploy

  deploy-app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    name: Deploy Tenant App
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: Build
        working-directory: frontend/apps/app
        env:
          NEXT_PUBLIC_API_URL: https://nexasistem-api.bukhoriakmalrtc02.workers.dev
          NEXT_PUBLIC_APP_URL: https://app.nexasistem.com
        run: npm run build
      - name: Deploy Pages
        working-directory: frontend/apps/app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@^3.60.0 pages deploy out --project-name nexasistem-app --branch main

  deploy-admin:
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    name: Deploy Admin Panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: Build
        working-directory: frontend/apps/admin
        env:
          NEXT_PUBLIC_API_URL: https://nexasistem-api.bukhoriakmalrtc02.workers.dev
          NEXT_PUBLIC_ADMIN_URL: https://admin.nexasistem.com
        run: npm run build
      - name: Deploy Pages
        working-directory: frontend/apps/admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@^3.60.0 pages deploy out --project-name nexasistem-admin --branch main

  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    name: Deploy Landing Page
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: Build
        working-directory: frontend/apps/web
        env:
          NEXT_PUBLIC_API_URL: https://nexasistem-api.bukhoriakmalrtc02.workers.dev
          NEXT_PUBLIC_APP_URL: https://app.nexasistem.com
        run: npm run build
      - name: Deploy Pages
        working-directory: frontend/apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@^3.60.0 pages deploy out --project-name nexasistem-web --branch main
